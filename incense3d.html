<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0b0a09">
<title>線香 — 3D prototype</title>
<style>
  html,body{margin:0;height:100%;background:#0b0a09;overflow:hidden;}
  body{touch-action:none;-webkit-user-select:none;user-select:none;}
  canvas{display:block;position:fixed;inset:0;}
  #tag{position:fixed;top:calc(env(safe-area-inset-top) + 14px);left:16px;z-index:2;
    font-family:"Hiragino Maru Gothic ProN",sans-serif;font-size:11px;letter-spacing:.24em;color:#5a554c;}
  #lbl{position:fixed;left:0;right:0;bottom:calc(env(safe-area-inset-bottom) + 18px);z-index:2;text-align:center;
    font-family:"Hiragino Mincho ProN",serif;font-size:12px;letter-spacing:.34em;color:#6f6a60;
    pointer-events:none;opacity:0;transition:opacity 1.4s ease;animation:p 4s ease-in-out infinite;}
  #lbl.show{opacity:.55;}
  @keyframes p{0%,100%{opacity:.3;}50%{opacity:.6;}}
  #err{position:fixed;inset:0;z-index:3;display:none;place-items:center;text-align:center;padding:32px;
    font-family:"Hiragino Mincho ProN",serif;color:#b9b3ab;font-size:14px;line-height:2;}
</style>
</head>
<body>
<div id="tag">線香 ／ 3D prototype</div>
<div id="lbl">ドラッグで回す</div>
<div id="err"></div>
<script type="module">
const errEl=document.getElementById("err");
function fail(m){ errEl.style.display="grid"; errEl.textContent="3D を読み込めませんでした。\n"+m; }
let THREE;
try{ THREE = await import("https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"); }
catch(e){ fail("Three.js の読み込みに失敗（ネット接続を確認）"); throw e; }

try{
const W=()=>innerWidth, H=()=>innerHeight;
const renderer=new THREE.WebGLRenderer({antialias:true,alpha:false});
renderer.setPixelRatio(Math.min(2,devicePixelRatio||1));
renderer.setSize(W(),H());
document.body.appendChild(renderer.domElement);

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x0b0a09);
scene.fog=new THREE.FogExp2(0x0b0a09,0.045);

const camera=new THREE.PerspectiveCamera(34, W()/H(), 0.1, 100);
const target=new THREE.Vector3(0,1.1,0);

/* ---- lighting ---- */
scene.add(new THREE.AmbientLight(0x2a3346, 0.6));
scene.add(new THREE.HemisphereLight(0x556b8c, 0x130f0a, 0.6));
const cool=new THREE.DirectionalLight(0x6f84ad, 0.7); cool.position.set(-4,6,3); scene.add(cool);
const EMBER=new THREE.Vector3(0,2.25,0);
const emberLight=new THREE.PointLight(0xff7a32, 7.0, 9, 2.0);
emberLight.position.copy(EMBER); scene.add(emberLight);

/* ---- the incense ---- */
const incense=new THREE.Group(); scene.add(incense);
// stick
const stickMat=new THREE.MeshStandardMaterial({color:0x6e5840,roughness:0.8,metalness:0.0});
const stick=new THREE.Mesh(new THREE.CylinderGeometry(0.028,0.04,4.4,16), stickMat);
stick.position.y=0.05; incense.add(stick);
// charred upper portion (just below the burning tip)
const charMat=new THREE.MeshStandardMaterial({color:0x171311,roughness:1.0});
const char=new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.034,0.5,16), charMat);
char.position.y=2.0; incense.add(char);
// ember
const ember=new THREE.Mesh(new THREE.SphereGeometry(0.062,20,20), new THREE.MeshBasicMaterial({color:0xff9248}));
ember.position.copy(EMBER); incense.add(ember);
// holder
const holderMat=new THREE.MeshStandardMaterial({color:0x2a2118,roughness:0.7,metalness:0.2});
const holder=new THREE.Mesh(new THREE.CylinderGeometry(0.34,0.42,0.16,28), holderMat);
holder.position.y=-2.18; incense.add(holder);

/* ---- soft round sprite texture ---- */
function softTex(){
  const c=document.createElement("canvas"); c.width=c.height=64; const g=c.getContext("2d");
  const grd=g.createRadialGradient(32,32,0,32,32,32);
  grd.addColorStop(0,"rgba(255,255,255,1)"); grd.addColorStop(.45,"rgba(255,255,255,.4)"); grd.addColorStop(1,"rgba(255,255,255,0)");
  g.fillStyle=grd; g.fillRect(0,0,64,64); const t=new THREE.CanvasTexture(c); return t;
}
const tex=softTex();
// vertically-elongated wisp for the smoke (reads as tendrils / flame tongues)
function wispTex(){
  const c=document.createElement("canvas"); c.width=c.height=64; const g=c.getContext("2d");
  g.translate(32,32); g.scale(0.42,1.0);
  const grd=g.createRadialGradient(0,0,0,0,0,32);
  grd.addColorStop(0,"rgba(255,255,255,1)"); grd.addColorStop(.5,"rgba(255,255,255,.3)"); grd.addColorStop(1,"rgba(255,255,255,0)");
  g.fillStyle=grd; g.beginPath(); g.arc(0,0,32,0,7); g.fill(); return new THREE.CanvasTexture(c);
}
const wtex=wispTex();

/* ---- ember glow (fake bloom via additive sprites) ---- */
const glowMat=new THREE.SpriteMaterial({map:tex,color:0xff7a30,transparent:true,opacity:0.5,blending:THREE.AdditiveBlending,depthWrite:false});
const glow=new THREE.Sprite(glowMat); glow.scale.set(0.95,0.95,1); glow.position.copy(EMBER); scene.add(glow);
const glow2=new THREE.Sprite(glowMat.clone()); glow2.material.opacity=0.85; glow2.scale.set(0.34,0.34,1); glow2.position.copy(EMBER); scene.add(glow2);

/* ---- smoke: depth-attenuated billboard particles ---- */
const N=720;
const pos=new Float32Array(N*3), col=new Float32Array(N*3), aSize=new Float32Array(N), aAlpha=new Float32Array(N);
const P=new Array(N);
const cWarm=new THREE.Color(0xc7a07a), cGrey=new THREE.Color(0xb7bcc2), tmp=new THREE.Color();
function respawn(i){
  P[i]={ x:EMBER.x+(Math.random()-.5)*0.018, y:EMBER.y+Math.random()*0.04, z:EMBER.z+(Math.random()-.5)*0.018,
    vx:(Math.random()-.5)*0.0015, vy:0.015+Math.random()*0.011, vz:(Math.random()-.5)*0.0015,
    life:0, max:8+Math.random()*8, size:0.14+Math.random()*0.12, seed:Math.random()*100 };
}
for(let i=0;i<N;i++){ respawn(i); const p=P[i]; p.life=Math.random()*p.max; const r=p.life/p.max;
  p.y=EMBER.y+r*3.0; p.x+=(Math.random()-.5)*r*0.8; p.z+=(Math.random()-.5)*r*0.8; p.size+=r*0.7; } // pre-distribute the column

const geo=new THREE.BufferGeometry();
geo.setAttribute("position", new THREE.BufferAttribute(pos,3).setUsage(THREE.DynamicDrawUsage));
geo.setAttribute("aColor",   new THREE.BufferAttribute(col,3).setUsage(THREE.DynamicDrawUsage));
geo.setAttribute("aSize",    new THREE.BufferAttribute(aSize,1).setUsage(THREE.DynamicDrawUsage));
geo.setAttribute("aAlpha",   new THREE.BufferAttribute(aAlpha,1).setUsage(THREE.DynamicDrawUsage));
const smokeMat=new THREE.ShaderMaterial({
  uniforms:{ uTex:{value:wtex}, uScale:{value:H()*renderer.getPixelRatio()*0.5} },
  transparent:true, depthWrite:false, blending:THREE.NormalBlending,
  vertexShader:`
    attribute float aSize; attribute float aAlpha; attribute vec3 aColor;
    varying float vA; varying vec3 vC; uniform float uScale;
    void main(){ vA=aAlpha; vC=aColor;
      vec4 mv=modelViewMatrix*vec4(position,1.0);
      gl_PointSize = aSize * (uScale / -mv.z);
      gl_Position = projectionMatrix*mv; }`,
  fragmentShader:`
    uniform sampler2D uTex; varying float vA; varying vec3 vC;
    void main(){ float a=texture2D(uTex,gl_PointCoord).a;
      gl_FragColor = vec4(vC, a*vA); }`
});
const smoke=new THREE.Points(geo, smokeMat); smoke.frustumCulled=false; scene.add(smoke);

let wind=0;
function updateSmoke(dt,t){
  wind += ((Math.sin(t*0.0003)*0.5+Math.sin(t*0.00011+1.7)*0.5)*0.003 - wind)*0.03;
  const sway = Math.sin(t*0.0017)*0.0026 + Math.sin(t*0.0009+2.1)*0.0018; // a slow flame-like dance
  for(let i=0;i<N;i++){
    const p=P[i]; p.life+=dt*0.055;
    if(p.life>=p.max) respawn(i);
    const r=p.life/p.max;
    const hf=Math.min(1,Math.max(0,(p.y-EMBER.y)/1.3)); // laminar at the ember, turbulent as it climbs
    const turb=0.0014+0.0080*hf;
    // coherent, position-based curl → particles braid into tendrils instead of spreading into a blob
    p.vx += (Math.sin(p.y*1.05 + p.z*0.9 + t*0.0008)*turb + Math.cos(p.y*2.1 - t*0.0011)*turb*0.5 + (wind+sway)*hf)*dt;
    p.vz += (Math.cos(p.y*1.15 + p.x*0.9 + t*0.0007)*turb + Math.sin(p.y*2.3 + t*0.0009)*turb*0.5)*dt;
    p.vy += 0.0006*dt;
    p.vx*=0.985; p.vz*=0.985;
    p.x += p.vx*dt; p.y += p.vy*dt; p.z += p.vz*dt;
    p.size += 0.0038*dt;
    const a = Math.sin(Math.min(1,r)*Math.PI) * 0.3;
    const h = Math.min(1, Math.max(0, (p.y-EMBER.y)/0.7));
    tmp.copy(cWarm).lerp(cGrey, h);
    pos[i*3]=p.x; pos[i*3+1]=p.y; pos[i*3+2]=p.z;
    col[i*3]=tmp.r; col[i*3+1]=tmp.g; col[i*3+2]=tmp.b;
    aSize[i]=p.size; aAlpha[i]=a;
  }
  geo.attributes.position.needsUpdate=true;
  geo.attributes.aColor.needsUpdate=true;
  geo.attributes.aSize.needsUpdate=true;
  geo.attributes.aAlpha.needsUpdate=true;
}

/* ---- orbit (drag) + idle spin ---- */
let theta=0.5, phi=1.32, radius=8.6, dragging=false, lastX=0, lastY=0, idle=0;
function applyCam(){
  const sp=Math.sin(phi);
  camera.position.set(target.x+radius*sp*Math.sin(theta), target.y+radius*Math.cos(phi), target.z+radius*sp*Math.cos(theta));
  camera.lookAt(target);
}
addEventListener("pointerdown",e=>{ dragging=true; lastX=e.clientX; lastY=e.clientY; idle=0; });
addEventListener("pointermove",e=>{ if(!dragging)return;
  theta -= (e.clientX-lastX)*0.006; phi -= (e.clientY-lastY)*0.006;
  phi=Math.max(0.25,Math.min(1.55,phi)); lastX=e.clientX; lastY=e.clientY; idle=0; });
addEventListener("pointerup",()=>{dragging=false;});
addEventListener("pointercancel",()=>{dragging=false;});

addEventListener("resize",()=>{
  camera.aspect=W()/H(); camera.updateProjectionMatrix();
  renderer.setSize(W(),H());
  smokeMat.uniforms.uScale.value=H()*renderer.getPixelRatio()*0.5;
});

/* ---- loop ---- */
let last=0;
function frame(t){
  requestAnimationFrame(frame);
  const dt=Math.min(2,(t-last)/16.67||1); last=t;
  if(!dragging){ idle+=dt; if(idle>40) theta+=0.0016*dt; } // gentle drift after a pause
  emberLight.intensity = 6.4 + Math.sin(t*0.006)*0.9 + Math.sin(t*0.013)*0.4; // flicker
  const gs = 0.92 + Math.sin(t*0.006)*0.07; glow.scale.set(gs,gs,1);
  updateSmoke(dt,t);
  applyCam();
  renderer.render(scene,camera);
}
applyCam();
requestAnimationFrame(frame);
setTimeout(()=>document.getElementById("lbl").classList.add("show"),900);
}catch(e){ fail(e.message||String(e)); throw e; }
</script>
</body>
</html>
